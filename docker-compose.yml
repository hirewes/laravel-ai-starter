services:
  web:
    build: ./docker/nginx
    container_name: nginx_laravel
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/config/default.conf:/etc/nginx/conf.d/default.conf
      - ./app:/var/www/html
  app:
    build: ./docker/php
    container_name: php_laravel
    working_dir: /var/www/html
    volumes:
      - ./docker/php/config/php.ini:/usr/local/etc/php/php.ini
      - ./app:/var/www/html
  worker:
    build: ./docker/php
    container_name: php_laravel_worker
    working_dir: /var/www/html
    command: php artisan queue:work database --sleep=1 --tries=1 --timeout=120
    depends_on:
      - app
      - db
    volumes:
      - ./docker/php/config/php.ini:/usr/local/etc/php/php.ini
      - ./app:/var/www/html
  db:
    image: mysql:8.0.28
    command: --local-infile=1
    platform: linux/amd64
    container_name: mysql_laravel
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_ai_starter
      TZ: "Asia/Tokyo"
    volumes:
      - ./docker/mysql:/etc/mysql/conf.d
      - ./docker/mysql/db:/var/lib/mysql
  mail:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
      - "1025:1025"